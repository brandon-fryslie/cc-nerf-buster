# Builds and pushes cc-nerf-buster to the homelab registry on every push to master.
#
# Prerequisites (one-time):
#   git remote add gitea git@gitea.sanctuary.gdn:brandon-fryslie/cc-nerf-buster.git
#   git push gitea master
#
# The Gitea Actions runner on the LAN has direct access to the registry at
# 192.168.7.208:5000 — no auth required.

name: docker-build

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and push
        run: |
          docker build -t 192.168.7.208:5000/cc-nerf-buster:latest .
          docker push 192.168.7.208:5000/cc-nerf-buster:latest

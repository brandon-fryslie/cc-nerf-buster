# Builds and pushes cc-nerf-buster, deploys to Nomad, and syncs the image
# tag back to homelab-infra so Terraform always reflects what's running.

name: docker-build

on:
  push:
    branches:
      - master

env:
  REGISTRY: 192.168.7.208:5000
  IMAGE: 192.168.7.208:5000/cc-nerf-buster
  HOME_INFRA_REPO: brandon-fryslie/homelab-infra
  GITEA_HOST: gitea.sanctuary.gdn

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Fully-qualified host so the runner pulls from gitea instead of the
      # default GitHub fallback — homelab-infra is gitea-only.
      - uses: gitea.sanctuary.gdn/brandon-fryslie/homelab-infra/.gitea/actions/builder-utils@master
        id: utils

      - name: Build and push
        run: |
          docker build -t "${{ env.IMAGE }}:${{ steps.utils.outputs.image-tag }}" .
          docker push "${{ env.IMAGE }}:${{ steps.utils.outputs.image-tag }}"

      - name: Deploy to Nomad
        run: |
          nomad-deploy cc-nerf-buster "${{ env.IMAGE }}:${{ steps.utils.outputs.image-tag }}"

      - name: Sync image tag to homelab-infra
        env:
          GITEA_TOKEN: ${{ gitea.token }}
        run: |
          TAG="${{ steps.utils.outputs.image-tag }}"
          curl -sf \
            -H "Authorization: token ${GITEA_TOKEN}" \
            "https://${{ env.GITEA_HOST }}/api/v1/repos/${{ env.HOME_INFRA_REPO }}/contents/jobs/cc-nerf-buster.nomad.hcl" \
            | jq -r '.content' | base64 -d \
            | update-file-image-tag - "${{ env.IMAGE }}" "${TAG}" \
            | gitea-update-file \
                "${{ env.GITEA_HOST }}" \
                "${{ env.HOME_INFRA_REPO }}" \
                "jobs/cc-nerf-buster.nomad.hcl" \
                "ci: update cc-nerf-buster image to ${TAG}"

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>—</title>
  <meta name="description" content="">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%99%EF%B8%8F%3C/text%3E%3C/svg%3E">
</head>
<body>
  <header class="hero" id="hero">
    <div class="container">
      <p class="eyebrow" id="eyebrow"></p>
      <h1 id="project-name">—</h1>
      <p class="tagline" id="tagline">—</p>
      <div class="badges" id="badges"></div>
      <div class="ctas" id="ctas"></div>
    </div>
  </header>

  <section class="visual" id="visual-section" hidden>
    <div class="container">
      <div class="visual-frame" id="visual-frame"></div>
    </div>
  </section>

  <section class="content" id="highlights-section" hidden>
    <div class="container">
      <h2 id="highlights-heading">Highlights</h2>
      <div class="highlights-grid" id="highlights"></div>
    </div>
  </section>

  <section class="content" id="quickstart-section" hidden>
    <div class="container">
      <h2 id="quickstart-heading">Quickstart</h2>
      <pre class="code-block"><code id="quickstart-code"></code></pre>
    </div>
  </section>

  <section class="content" id="screenshots-section" hidden>
    <div class="container">
      <h2 id="screenshots-heading">Screenshots</h2>
      <div class="screenshots" id="screenshots"></div>
    </div>
  </section>

  <section class="content" id="links-section" hidden>
    <div class="container">
      <h2 id="links-heading">Links</h2>
      <ul class="links-list" id="links"></ul>
    </div>
  </section>

  <footer>
    <div class="container">
      <small>
        <span id="footer-source"></span>
        ·
        Built with
        <a href="https://github.com/brandon-fryslie/gh-pages-showcase" target="_blank" rel="noopener">gh-pages-showcase</a>
      </small>
    </div>
  </footer>

  <script type="module" src="main.js"></script>
</body>
</html>
